name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check

      # Tokenless publish via npm Trusted Publishing (OIDC): no NPM_TOKEN — the
      # id-token above is exchanged for a short-lived credential against the
      # trusted-publisher configured on npmjs.com for each package. Provenance is
      # attached automatically. We `pnpm pack` first (pnpm rewrites the
      # `workspace:*` protocol into real versions in the tarball), then `npm
      # publish` the tarball, because only the npm CLI performs the OIDC exchange.
      - name: Publish packages (trusted publishing)
        run: |
          mkdir -p /tmp/tarballs
          for pkg in core cli mcp; do
            pnpm --filter "@monadeo.com/grimoire-$pkg" pack --pack-destination /tmp/tarballs
          done
          for tgz in /tmp/tarballs/monadeo.com-grimoire-core-*.tgz \
                     /tmp/tarballs/monadeo.com-grimoire-cli-*.tgz \
                     /tmp/tarballs/monadeo.com-grimoire-mcp-*.tgz; do
            npm publish "$tgz" --provenance --access public
          done

  formula-bump:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Compute sha256 of the published CLI tarball
        id: tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL=""
          for attempt in 1 2 3 4 5; do
            TARBALL=$(npm view "@monadeo.com/grimoire-cli@${VERSION}" dist.tarball 2>/dev/null) && [ -n "$TARBALL" ] && break
            echo "Registry not ready (attempt $attempt); retrying in 15s..."
            sleep 15
          done
          if [ -z "$TARBALL" ]; then
            echo "::error::Could not resolve the published tarball for @monadeo.com/grimoire-cli@${VERSION}."
            exit 1
          fi
          curl -fsSL "$TARBALL" -o cli.tgz
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 cli.tgz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew formula
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.tarball.outputs.version }}
          SHA256: ${{ steps.tarball.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/monadeo/homebrew-tap.git" tap
          cd tap
          sed -i -E "s#^(  url \").*(\")\$#\1https://registry.npmjs.org/@monadeo.com/grimoire-cli/-/grimoire-cli-${VERSION}.tgz\2#" Formula/grimoire.rb
          sed -i -E "s#^(  sha256 \").*(\")\$#\1${SHA256}\2#" Formula/grimoire.rb
          git config user.name "monadeo-release-bot"
          git config user.email "release-bot@monadeo.com"
          git commit -am "grimoire ${VERSION}"
          git push
